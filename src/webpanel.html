<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { width:100vw; height:100vh; overflow:hidden; background:#fff; }
    #status {
      display:flex; align-items:center; justify-content:center;
      width:100%; height:100%;
      color:#999; font-family:"Segoe UI","Microsoft JhengHei",sans-serif;
      font-size:13px; text-align:center;
    }
  </style>
</head>
<body>
  <div id="status">載入中...</div>
  <!-- 此頁面會被 create_url_panel 的 on_page_load JS 重導向到外部 URL -->
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        if (window.location.href.includes('webpanel.html')) {
          document.getElementById('status').innerHTML =
            '頁面載入中，若長時間未載入請關閉並重新建立面板';
        }
      }, 3000);
    });
  </script>
</body>
</html>
