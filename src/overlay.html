<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>框選區域</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100vw; height: 100vh; overflow: hidden; }
      body {
        background: rgba(0,0,0,0.01);
        cursor: crosshair;
        user-select: none;
        font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
      }
      #bg {
        position: fixed; inset: 0;
        background-size: cover;
        background-position: center;
        filter: brightness(0.5);
      }
      #hint {
        position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        color: #fff; font-size: 20px;
        text-align: center; pointer-events: none;
        z-index: 5; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      }
      #hint small { display: block; font-size: 13px; opacity: 0.6; margin-top: 8px; }
      #sel {
        position: fixed;
        border: 2px solid #89b4fa;
        background: rgba(137,180,250,0.15);
        display: none;
        pointer-events: none;
        z-index: 10;
      }
      #sz {
        position: fixed;
        background: rgba(0,0,0,0.85); color: #fff;
        padding: 5px 12px;
        font-size: 15px; font-family: monospace; font-weight: bold;
        border: 1px solid #89b4fa;
        display: none; pointer-events: none; z-index: 20;
      }
      /* 框選完成後的選擇面板 */
      #action-panel {
        display: none;
        position: fixed;
        z-index: 50;
        background: #fff;
        border: 1px solid #ddd;
        padding: 12px 16px;
        min-width: 320px;
        font-size: 13px;
        color: #111;
        box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      }
      #action-panel .title {
        font-weight: 700; font-size: 14px; margin-bottom: 10px;
        display: flex; justify-content: space-between; align-items: center;
      }
      #action-panel .title button {
        background: none; border: none; color: #999; cursor: pointer; font-size: 14px;
      }
      #action-panel .opt {
        padding: 10px; border: 1px solid #eee; margin-bottom: 6px; cursor: pointer;
      }
      #action-panel .opt:hover { border-color: #111; }
      #action-panel .opt b { font-size: 12px; display: block; margin-bottom: 2px; }
      #action-panel .opt small { font-size: 10px; color: #999; }
      #url-row { display: none; margin-top: 8px; }
      #url-row input {
        width: 100%; padding: 8px 10px; border: 1px solid #ddd;
        font-size: 12px; outline: none; font-family: inherit;
      }
      #url-row input:focus { border-color: #111; }
      #url-row .btns { display: flex; gap: 6px; margin-top: 8px; }
      #url-row .btns button {
        padding: 6px 14px; border: 1px solid #ddd; font-size: 11px;
        cursor: pointer; font-family: inherit; background: #fff;
      }
      #url-row .btn-p { background: #111; color: #fff; border-color: #111; }
      #url-row .btn-p:hover { background: #333; }
    </style>
  </head>
  <body>
    <div id="bg"></div>
    <div id="hint">正在載入螢幕截圖...<small>按 ESC 取消</small></div>
    <div id="sel"></div>
    <div id="sz"></div>

    <div id="action-panel">
      <div class="title"><span>選擇面板類型</span><button id="ap-close">&#x2715;</button></div>
      <div class="opt" id="opt-url"><b>網頁面板（可互動）</b><small>輸入 URL，可操作網頁內容</small></div>
      <div class="opt" id="opt-cap"><b>截圖面板（靜態）</b><small>擷取螢幕畫面為靜態圖片</small></div>
      <div id="url-row">
        <div id="detected-hint" style="display:none;font-size:10px;color:#090;margin-bottom:4px;">已自動偵測網址</div>
        <input id="url-input" placeholder="https://www.youtube.com/watch?v=..." />
        <div class="btns">
          <button class="btn-p" id="url-go">建立</button>
          <button id="url-back">返回</button>
        </div>
      </div>
    </div>

    <script src="/tauri-init.js"></script>
    <script>
      (function() {
        var bg = document.getElementById("bg");
        var hint = document.getElementById("hint");
        var sel = document.getElementById("sel");
        var sz = document.getElementById("sz");
        var ap = document.getElementById("action-panel");
        var dragging = false, sx = 0, sy = 0;
        var ready = false;
        var selectedRect = null; // 框選結果
        var invoke = null, win = null;

        waitForTauri(function(ctx) {
          invoke = ctx.invoke;
          win = ctx.win;
          invoke("get_screenshot_base64").then(function(dataUrl) {
            bg.style.backgroundImage = "url(" + dataUrl + ")";
            hint.innerHTML = "拖拉滑鼠框選要擷取的區域<small>按 ESC 取消</small>";
            ready = true;
          }).catch(function(err) {
            hint.innerHTML = "截圖取得失敗：" + err + "<small>按 ESC 取消</small>";
          });
        });

        // ESC 取消
        document.addEventListener("keydown", function(e) {
          if (e.key === "Escape") {
            if (ap.style.display === "block") {
              resetSelection();
            } else if (win) {
              win.close();
            }
          }
        });

        // 框選
        document.addEventListener("mousedown", function(e) {
          if (!ready || ap.style.display === "block") return;
          dragging = true;
          sx = e.clientX; sy = e.clientY;
          hint.style.display = "none";
          sel.style.display = "block";
          sz.style.display = "block";
          upd(e.clientX, e.clientY);
        });

        document.addEventListener("mousemove", function(e) {
          if (dragging) upd(e.clientX, e.clientY);
        });

        document.addEventListener("mouseup", function(e) {
          if (!dragging) return;
          dragging = false;
          var r = rect(e.clientX, e.clientY);

          // 規格書 §8.1:最小面板尺寸,與 Rust 端 MIN_PANEL_SIZE 對齊
          if (r.w < 50 || r.h < 50) {
            hint.style.display = "block";
            hint.innerHTML = "範圍太小（至少 50×50）<small>按 ESC 取消</small>";
            sel.style.display = "none";
            sz.style.display = "none";
            return;
          }

          // 記住框選結果
          selectedRect = r;

          // 偵測到 URL → 直接建立 URL 面板，不顯示選單
          if (invoke) {
            invoke("get_detected_url").then(function(url) {
              if (url && selectedRect) {
                invoke("create_url_panel_at", {
                  url: url, x: r.x, y: r.y, width: r.w, height: r.h
                }).then(function() {
                  win.close();
                }).catch(function(err) {
                  hint.style.display = "block";
                  hint.innerHTML = "建立失敗：" + err + "<small>按 ESC 取消</small>";
                  sel.style.display = "none";
                  sz.style.display = "none";
                });
              } else {
                // 沒偵測到 URL → 顯示選單讓使用者選擇
                showActionPanel(r);
              }
            }).catch(function() {
              showActionPanel(r);
            });
          } else {
            showActionPanel(r);
          }
        });

        function showActionPanel(r) {
          var px = r.x + r.w + 10;
          var py = r.y + r.h + 10;
          if (px + 340 > window.innerWidth) px = r.x - 350;
          if (py + 200 > window.innerHeight) py = r.y - 210;
          if (px < 10) px = 10;
          if (py < 10) py = 10;
          ap.style.left = px + "px";
          ap.style.top = py + "px";
          ap.style.display = "block";
          document.getElementById("url-row").style.display = "none";
          document.getElementById("detected-hint").style.display = "none";
        }

        function resetSelection() {
          ap.style.display = "none";
          selectedRect = null;
          sel.style.display = "none";
          sz.style.display = "none";
          hint.style.display = "block";
          hint.innerHTML = "拖拉滑鼠框選要擷取的區域<small>按 ESC 取消</small>";
          // 清除殘留的 URL 輸入和偵測提示
          document.getElementById("url-input").value = "";
          document.getElementById("url-row").style.display = "none";
          document.getElementById("detected-hint").style.display = "none";
        }

        // 關閉選擇面板
        document.getElementById("ap-close").onclick = resetSelection;

        var creating = false;
        document.getElementById("opt-cap").onclick = function() {
          if (creating || !selectedRect || !invoke) return;
          creating = true;
          var r = selectedRect;
          ap.style.display = "none";
          invoke("capture_region", {
            x: r.x, y: r.y, width: r.w, height: r.h
          }).then(function() {
            win.close();
          }).catch(function(err) {
            creating = false;
            hint.style.display = "block";
            hint.innerHTML = "擷取失敗：" + err + "<small>按 ESC 取消</small>";
            sel.style.display = "none";
            sz.style.display = "none";
          });
        };

        // 選擇「網頁面板」→ 顯示 URL 輸入
        document.getElementById("opt-url").onclick = function() {
          document.getElementById("url-row").style.display = "block";
          document.getElementById("url-input").focus();
        };

        // URL 建立
        document.getElementById("url-go").onclick = doCreateUrl;
        document.getElementById("url-input").onkeydown = function(e) {
          if (e.key === "Enter") doCreateUrl();
        };
        document.getElementById("url-back").onclick = function() {
          document.getElementById("url-row").style.display = "none";
          document.getElementById("url-input").value = "";
        };

        function doCreateUrl() {
          if (creating) return;
          var url = document.getElementById("url-input").value.trim();
          if (!url) return;
          if (!/^https?:\/\//i.test(url)) url = "https://" + url;
          try { new URL(url); } catch(e) { hint.style.display = "block"; hint.innerHTML = "網址格式不正確<small>按 ESC 取消</small>"; return; }
          if (!selectedRect || !invoke) return;
          creating = true;
          var r = selectedRect;
          ap.style.display = "none";

          invoke("create_url_panel_at", {
            url: url, x: r.x, y: r.y, width: r.w, height: r.h
          }).then(function() {
            win.close();
          }).catch(function(err) {
            creating = false;
            hint.style.display = "block";
            hint.innerHTML = "建立失敗：" + err + "<small>按 ESC 取消</small>";
            sel.style.display = "none";
            sz.style.display = "none";
          });
        }

        function rect(cx, cy) {
          // 限制在螢幕範圍內
          var x1 = Math.max(0, Math.min(sx, cx));
          var y1 = Math.max(0, Math.min(sy, cy));
          var x2 = Math.min(window.innerWidth, Math.max(sx, cx));
          var y2 = Math.min(window.innerHeight, Math.max(sy, cy));
          return { x: x1, y: y1, w: x2 - x1, h: y2 - y1 };
        }

        function upd(cx, cy) {
          var r = rect(cx, cy);
          sel.style.left = r.x + "px";
          sel.style.top = r.y + "px";
          sel.style.width = r.w + "px";
          sel.style.height = r.h + "px";
          sz.style.left = (r.x + r.w + 6) + "px";
          sz.style.top = (r.y + r.h + 6) + "px";
          sz.textContent = r.w + " x " + r.h;
        }
      })();
    </script>
  </body>
</html>
