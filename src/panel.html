<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>Panel</title>
    <style>
      * { margin:0; padding:0; box-sizing:border-box; }
      html, body { width:100%; height:100%; overflow:hidden; margin:0; padding:0; }
      body { background:#000; font-family:"Segoe UI","Microsoft JhengHei",sans-serif; position:relative; }

      #img {
        width:100%; height:100%;
        object-fit:fill;
        display:block;
        position:absolute; inset:0;
      }
      #img.hidden { display:none; }

      /* 拖移把手 — 編輯模式時覆蓋整個面板 */
      #drag {
        position:absolute; inset:0;
        cursor:move; -webkit-app-region:drag; z-index:20;
      }
      body.locked #drag { display:none; }

      /* 工具列：只在編輯模式 hover 時出現 */
      #bar {
        position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
        display:flex; gap:1px; background:#fff; border:1px solid #ddd;
        padding:2px; opacity:0; transition:opacity 0.15s; pointer-events:none;
        z-index:30;
      }
      body.edit:hover #bar { opacity:1; pointer-events:auto; }

      #bar button {
        height:22px; border:1px solid #eee; background:#fff;
        color:#666; font-size:10px; cursor:pointer; padding:0 8px;
        -webkit-app-region:no-drag;
      }
      #bar button:hover { background:#f5f5f5; color:#111; }

      /* 調整大小把手 — 編輯模式才顯示 */
      .rh { position:absolute; z-index:25; display:none; -webkit-app-region:no-drag; }
      body.edit .rh { display:block; }
      .rh.r { top:0; right:0; width:6px; height:100%; cursor:ew-resize; }
      .rh.b { bottom:0; left:0; width:100%; height:6px; cursor:ns-resize; }
      .rh.c { bottom:0; right:0; width:12px; height:12px; cursor:nwse-resize; background:rgba(0,0,0,0.2); }

      /* 編輯模式邊框指示 */
      body.edit::after {
        content:''; position:absolute; inset:0;
        border:2px solid rgba(137,180,250,0.5);
        pointer-events:none; z-index:19;
      }

      /* 佔位 */
      #placeholder {
        position:absolute; inset:0; display:flex; flex-direction:column;
        align-items:center; justify-content:center; color:#555; font-size:12px;
        gap:6px;
      }
      #placeholder.hidden { display:none; }
    </style>
  </head>
  <body class="locked">
    <div id="drag"></div>
    <img id="img" class="hidden" draggable="false" />
    <div id="placeholder">
      <span style="font-size:24px;opacity:0.3;">📋</span>
      <span>截圖面板</span>
    </div>

    <div class="rh r" id="rr"></div>
    <div class="rh b" id="rb"></div>
    <div class="rh c" id="rc"></div>

    <div id="bar">
      <button id="btn-lock" title="鎖定/解鎖">鎖定</button>
      <button id="btn-x" title="關閉" style="color:#c00;">關閉</button>
    </div>

    <script>
    (function(){
      var mode = "locked"; // 預設鎖定
      var win = null;
      var invoke = null;
      var panelLabel = "";
      var imgEl = document.getElementById("img");
      var placeholder = document.getElementById("placeholder");

      var initialized = false;
      function initTauri() {
        if (initialized) return true;
        if (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke) {
          initialized = true;
          win = window.__TAURI__.window.getCurrentWindow();
          invoke = window.__TAURI__.core.invoke;
          panelLabel = win ? win.label : "";
          if (invoke && panelLabel) {
            invoke("get_panel_screenshot", { label: panelLabel }).then(function(path) {
              if (path) loadScreenshot(path);
            }).catch(function(){});
          }
          window.__TAURI__.event.listen("mode-changed", function(ev){
            setMode(ev.payload);
          });
          return true;
        }
        return false;
      }

      var waitCount = 0;
      function waitForTauri() {
        if (!initTauri() && waitCount++ < 50) {
          setTimeout(waitForTauri, 100);
        }
      }
      waitForTauri();

      // 載入截圖
      function loadScreenshot(path) {
        if (!path) return;
        var url;
        if (window.__TAURI__ && window.__TAURI__.core.convertFileSrc) {
          url = window.__TAURI__.core.convertFileSrc(path);
        } else {
          url = "asset://localhost/" + path.replace(/\\/g, "/").replace(/^\//, "");
        }
        imgEl.src = url;
        imgEl.onload = function() {
          imgEl.classList.remove("hidden");
          placeholder.classList.add("hidden");
        };
        imgEl.onerror = function() {
          var fileUrl = "file:///" + path.replace(/\\/g, "/");
          imgEl.src = fileUrl;
          imgEl.onerror = function() {
            console.warn("[panel] 截圖載入失敗:", path);
          };
        };
      }

      // 鎖定/解鎖 toggle 按鈕
      document.getElementById("btn-lock").addEventListener("click", function(){
        var newMode = (mode === "locked") ? "edit" : "locked";
        setMode(newMode);
        if (invoke && panelLabel) {
          invoke("set_panel_mode", { label: panelLabel, mode: newMode }).catch(function(){});
        }
      });

      // 關閉按鈕
      document.getElementById("btn-x").addEventListener("click", function(){
        if (invoke && panelLabel) {
          invoke("close_panel", { label: panelLabel }).catch(function(){});
        } else if (win) {
          win.close();
        }
      });

      function setMode(m) {
        mode = m;
        document.body.className = m === "locked" ? "locked" : "edit";
        document.getElementById("btn-lock").textContent = m === "locked" ? "解鎖" : "鎖定";
        if (win) win.setResizable(m === "edit");
      }

      // 調整大小（編輯模式）
      var resizing = false, rtype = "", rsx = 0, rsy = 0, rsw = 400, rsh = 300;
      ["rr","rb","rc"].forEach(function(id){
        document.getElementById(id).addEventListener("mousedown", function(e){
          if (mode !== "edit" || !win) return;
          resizing = true; rtype = id;
          rsx = e.screenX; rsy = e.screenY;
          win.scaleFactor().then(function(sf){
            win.innerSize().then(function(s){
              rsw = s.width / sf; rsh = s.height / sf;
            });
          });
          e.preventDefault();
        });
      });
      document.addEventListener("mousemove", function(e){
        if (!resizing || !win) return;
        var dx = e.screenX - rsx, dy = e.screenY - rsy;
        var nw = rsw, nh = rsh;
        if (rtype==="rr"||rtype==="rc") nw = Math.max(100, rsw + dx);
        if (rtype==="rb"||rtype==="rc") nh = Math.max(60, rsh + dy);
        win.setSize(new window.__TAURI__.window.LogicalSize(nw, nh));
      });
      document.addEventListener("mouseup", function(){ resizing = false; });
    })();
    </script>
  </body>
</html>
