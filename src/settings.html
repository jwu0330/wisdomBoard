<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WisdomBoard</title>
    <style>
      * { margin:0; padding:0; box-sizing:border-box; }
      body { font-family:"Segoe UI","Microsoft JhengHei",sans-serif; background:#fff; color:#111; font-size:13px; min-height:100vh; }

      .top { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:1px solid #ddd; }
      .top h1 { font-size:14px; font-weight:700; letter-spacing:0.5px; }
      .top .acts { display:flex; gap:2px; }
      .top .acts button { background:none; border:1px solid #ddd; color:#666; font-size:11px; cursor:pointer; padding:4px 10px; }
      .top .acts button:hover { background:#f5f5f5; color:#111; }

      .body { padding:12px 16px; }

      /* 快捷鍵設定區 */
      .hotkey-section { margin-bottom:12px; padding:10px 12px; border:1px solid #eee; background:#fafafa; }
      .hotkey-section .label { font-size:11px; color:#666; margin-bottom:6px; }
      .hotkey-row { display:flex; align-items:center; gap:6px; }
      .hotkey-row input { flex:1; padding:6px 10px; border:1px solid #ddd; font-size:12px; font-family:inherit; background:#fff; text-align:center; cursor:pointer; outline:none; }
      .hotkey-row input:focus { border-color:#111; background:#fffff0; }
      .hotkey-row button { padding:5px 10px; border:1px solid #ddd; font-size:11px; cursor:pointer; font-family:inherit; background:#fff; }
      .hotkey-row button:hover { background:#f5f5f5; }
      .hotkey-row .btn-save { background:#111; color:#fff; border-color:#111; }
      .hotkey-row .btn-save:hover { background:#333; }
      .hotkey-msg { font-size:10px; color:#999; margin-top:4px; }

      .add-btn { width:100%; padding:14px; border:1px dashed #ccc; background:none; color:#999; font-size:12px; cursor:pointer; font-family:inherit; margin-bottom:10px; }
      .add-btn:hover { border-color:#111; color:#111; }

      .card { border:1px solid #ddd; margin-bottom:8px; }
      .card-top { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-bottom:1px solid #eee; background:#fafafa; }
      .card-top .name { font-weight:600; font-size:12px; }
      .card-top .tag { font-size:9px; padding:1px 6px; border:1px solid #ccc; margin-left:6px; }
      .card-top .x { background:none; border:none; color:#999; cursor:pointer; font-size:12px; }
      .card-top .x:hover { color:#e00; }
      .card-body { padding:8px 12px; }
      .card-url { font-size:10px; color:#999; word-break:break-all; margin-bottom:6px; }
      .pills { display:flex; gap:2px; margin-bottom:6px; }
      .pill { padding:3px 10px; border:1px solid #ddd; font-size:10px; cursor:pointer; background:#fff; color:#666; font-family:inherit; }
      .pill:hover { border-color:#111; color:#111; }
      .pill.on { background:#111; color:#fff; border-color:#111; }
      .zoom-row { display:flex; align-items:center; gap:6px; }
      .zoom-row span { font-size:10px; color:#999; }
      .zoom-row input { flex:1; }
      .zoom-row .val { font-size:10px; min-width:30px; text-align:right; color:#666; }

      .empty { text-align:center; padding:30px; color:#ccc; font-size:12px; }

      .ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:100; align-items:center; justify-content:center; }
      .ov.show { display:flex; }
      .dlg { background:#fff; border:1px solid #ddd; width:320px; }
      .dlg-h { padding:10px 14px; border-bottom:1px solid #eee; font-size:13px; font-weight:600; display:flex; justify-content:space-between; align-items:center; }
      .dlg-h button { background:none; border:none; color:#999; cursor:pointer; }
      .dlg-b { padding:14px; }
      .opt { padding:10px; border:1px solid #eee; margin-bottom:6px; cursor:pointer; }
      .opt:hover { border-color:#111; }
      .opt b { font-size:12px; display:block; margin-bottom:2px; }
      .opt small { font-size:10px; color:#999; }
      .url-area { display:none; margin-top:10px; }
      .url-area.show { display:block; }
      .url-area input { width:100%; padding:8px 10px; border:1px solid #ddd; font-size:12px; font-family:inherit; outline:none; }
      .url-area input:focus { border-color:#111; }
      .url-area .row { display:flex; gap:6px; margin-top:8px; }
      .btn { padding:6px 14px; border:1px solid #ddd; font-size:11px; cursor:pointer; font-family:inherit; background:#fff; }
      .btn-p { background:#111; color:#fff; border-color:#111; }
      .btn-p:hover { background:#333; }
      .btn-p:disabled { opacity:0.3; }
      .err { display:none; margin-top:6px; padding:6px 10px; border:1px solid #e00; font-size:11px; color:#e00; }
      .err.show { display:block; }

      .foot { position:fixed; bottom:0; left:0; right:0; padding:5px 16px; border-top:1px solid #eee; font-size:10px; color:#999; display:flex; justify-content:space-between; background:#fff; }
    </style>
  </head>
  <body>
    <div class="top">
      <h1>WISDOMBOARD</h1>
      <div class="acts">
        <button id="btn-edit-all" title="全部編輯模式">全部編輯</button>
        <button id="btn-lock-all" title="全部穿透模式">全部穿透</button>
        <button id="btn-close-all" title="關閉全部面板">全部關閉</button>
      </div>
    </div>

    <div class="body">
      <!-- 快捷鍵設定 -->
      <div class="hotkey-section">
        <div class="label">全域快捷鍵</div>
        <div class="hotkey-row">
          <input id="hotkey-input" readonly placeholder="按下快捷鍵組合..." title="點擊後按下新的快捷鍵組合" />
          <button class="btn-save" id="hotkey-save">儲存</button>
          <button id="hotkey-reset">重設</button>
        </div>
        <div class="hotkey-msg" id="hotkey-msg"></div>
      </div>

      <!-- 開機自動啟動 -->
      <div class="hotkey-section">
        <div class="label">開機自動啟動</div>
        <div class="hotkey-row">
          <label><input type="checkbox" id="autostart-toggle" /> 啟用開機自動啟動</label>
        </div>
      </div>

      <button class="add-btn" id="btn-add">+ 新增面板</button>
      <div id="list"><div class="empty">尚未建立面板</div></div>
    </div>

    <div class="ov" id="dlg">
      <div class="dlg">
        <div class="dlg-h"><span>新增面板</span><button id="dlg-x">&#x2715;</button></div>
        <div class="dlg-b">
          <div class="opt" id="opt-url"><b>貼上網址</b><small>輸入 URL 顯示在面板中</small></div>
          <div class="opt" id="opt-cap"><b>框選螢幕區域</b><small>拖拉滑鼠框選要擷取的螢幕區域</small></div>
          <div class="url-area" id="url-area">
            <input id="url-in" placeholder="https://example.com" />
            <div class="err" id="url-err"></div>
            <div class="row">
              <button class="btn btn-p" id="url-ok" disabled>建立</button>
              <button class="btn" id="url-no">取消</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="foot">
      <span id="st">就緒</span>
      <span id="ct">面板：0</span>
    </div>

    <script type="module">
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;
      const { getCurrentWindow } = window.__TAURI__.window;

      let panels = [];
      const listEl = document.getElementById("list");
      const dlg = document.getElementById("dlg");
      const urlArea = document.getElementById("url-area");
      const urlIn = document.getElementById("url-in");
      const urlErr = document.getElementById("url-err");
      const urlOk = document.getElementById("url-ok");

      function esc(s) {
        var d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      // === 快捷鍵設定 ===
      const hotkeyInput = document.getElementById("hotkey-input");
      const hotkeyMsg = document.getElementById("hotkey-msg");
      let pendingHotkey = null;

      async function loadHotkey() {
        try {
          const cfg = await invoke("get_hotkey_config");
          hotkeyInput.value = cfg.display_name;
          pendingHotkey = null;
        } catch (e) {
          hotkeyInput.value = "Ctrl+Alt+S";
        }
      }

      hotkeyInput.addEventListener("focus", () => {
        console.log("[settings] hotkey input focused");
        hotkeyInput.value = "請按下快捷鍵...";
        hotkeyMsg.textContent = "按住修飾鍵（Ctrl/Alt/Shift）再按一個字母或數字鍵";
      });

      hotkeyInput.addEventListener("blur", () => {
        console.log("[settings] hotkey input blurred");
        if (!pendingHotkey) loadHotkey();
        hotkeyMsg.textContent = "";
      });

      hotkeyInput.addEventListener("keydown", (e) => {
        console.log("[settings] keydown:", e.key, "ctrl:", e.ctrlKey, "alt:", e.altKey, "shift:", e.shiftKey, "keyCode:", e.keyCode);
        e.preventDefault();
        if (["Control","Alt","Shift","Meta"].includes(e.key)) return;

        let mods = 0;
        const parts = [];
        if (e.altKey)   { mods |= 0x0001; parts.push("Alt"); }
        if (e.ctrlKey)  { mods |= 0x0002; parts.push("Ctrl"); }
        if (e.shiftKey) { mods |= 0x0004; parts.push("Shift"); }

        if (mods === 0) {
          hotkeyMsg.textContent = "請至少搭配一個修飾鍵（Ctrl/Alt/Shift）";
          return;
        }

        const KEY_MAP = {
          'F1':112,'F2':113,'F3':114,'F4':115,'F5':116,'F6':117,
          'F7':118,'F8':119,'F9':120,'F10':121,'F11':122,'F12':123,
          'ArrowLeft':37,'ArrowRight':39,'ArrowUp':38,'ArrowDown':40,
          'Home':36,'End':35,'PageUp':33,'PageDown':34,
          'Insert':45,'Delete':46,'Escape':27,'Tab':9,
          'Enter':13,'Space':32,'Backspace':8,
        };
        const vk = KEY_MAP[e.key] || e.keyCode;
        const keyName = e.key.length === 1 ? e.key.toUpperCase() : e.key;
        parts.push(keyName);
        const displayName = parts.join("+");

        hotkeyInput.value = displayName;
        pendingHotkey = { modifiers: mods, vk, display_name: displayName };
        hotkeyMsg.textContent = "按「儲存」套用新快捷鍵";
      });

      document.getElementById("hotkey-save").onclick = async () => {
        if (!pendingHotkey) { hotkeyMsg.textContent = "尚未設定新快捷鍵"; return; }
        try {
          await invoke("set_hotkey", {
            modifiers: pendingHotkey.modifiers,
            vk: pendingHotkey.vk,
            displayName: pendingHotkey.display_name
          });
          hotkeyMsg.textContent = "快捷鍵已更新為 " + pendingHotkey.display_name;
          pendingHotkey = null;
        } catch (e) {
          hotkeyMsg.textContent = "設定失敗：" + e;
        }
      };

      document.getElementById("hotkey-reset").onclick = async () => {
        try {
          await invoke("set_hotkey", { modifiers: 0x0001|0x0002, vk: 0x53, displayName: "Ctrl+Alt+S" });
          hotkeyInput.value = "Ctrl+Alt+S";
          pendingHotkey = null;
          hotkeyMsg.textContent = "已重設為 Ctrl+Alt+S";
        } catch (e) {
          hotkeyMsg.textContent = "重設失敗：" + e;
        }
      };

      loadHotkey();

      // === autostart ===
      async function loadAutostart() {
        try {
          const enabled = await invoke("get_autostart");
          document.getElementById("autostart-toggle").checked = enabled;
        } catch {}
      }
      document.getElementById("autostart-toggle").addEventListener("change", async (e) => {
        try {
          await invoke("set_autostart", { enabled: e.target.checked });
        } catch (err) {
          console.error("[settings] autostart 設定失敗:", err);
          document.getElementById("st").textContent = "自啟動設定失敗：" + err;
        }
      });
      loadAutostart();

      // === 面板管理 ===
      document.getElementById("btn-add").onclick = () => { dlg.classList.add("show"); urlArea.classList.remove("show"); urlErr.classList.remove("show"); };
      document.getElementById("dlg-x").onclick = closeDlg;
      dlg.onclick = (e) => { if (e.target === dlg) closeDlg(); };
      function closeDlg() { dlg.classList.remove("show"); urlArea.classList.remove("show"); urlErr.classList.remove("show"); urlIn.value = ""; }

      document.getElementById("opt-url").onclick = () => { urlArea.classList.add("show"); urlIn.focus(); };
      function updateUrlOk() { urlOk.disabled = !urlIn.value.trim(); urlErr.classList.remove("show"); }
      urlIn.addEventListener("input", updateUrlOk);
      urlIn.addEventListener("paste", () => setTimeout(updateUrlOk, 0));
      urlOk.onclick = doCreateUrl;
      urlIn.onkeydown = (e) => { if (e.key === "Enter" && urlIn.value.trim()) doCreateUrl(); };
      document.getElementById("url-no").onclick = () => { urlArea.classList.remove("show"); urlIn.value = ""; };

      async function doCreateUrl() {
        let url = urlIn.value.trim();
        if (!url) return;
        if (!/^https?:\/\//i.test(url)) url = "https://" + url;
        try { new URL(url); } catch { urlErr.textContent = "網址格式不正確"; urlErr.classList.add("show"); return; }
        try {
          const label = await invoke("create_url_panel", { url });
          panels.push({ label, url, type: "url", mode: "edit", zoom: 1.0 });
          render(); closeDlg();
        } catch (e) { urlErr.textContent = "建立失敗：" + e; urlErr.classList.add("show"); }
      }

      document.getElementById("opt-cap").onclick = async () => {
        closeDlg();
        try { await invoke("open_capture_overlay"); } catch (e) { alert("建立失敗：" + e); }
      };

      document.getElementById("btn-edit-all").onclick = async () => { panels.forEach(p => p.mode = "edit"); await invoke("set_mode", { mode: "edit" }); render(); };
      document.getElementById("btn-lock-all").onclick = async () => { panels.forEach(p => p.mode = "locked"); await invoke("set_mode", { mode: "locked" }); render(); };
      document.getElementById("btn-close-all").onclick = async () => {
        try {
          await invoke("close_all_panels");
        } catch (e) {
          console.warn("[settings] close_all_panels 失敗:", e);
        }
        panels = []; render();
        // 設定視窗本身也關掉，回到純 tray 常駐狀態
        window.__TAURI__.window.getCurrentWindow().close();
      };

      function render() {
        document.getElementById("ct").textContent = "面板：" + panels.length;
        if (!panels.length) { listEl.innerHTML = '<div class="empty">尚未建立面板</div>'; return; }
        listEl.innerHTML = panels.map((p, i) => {
          const isUrl = p.type === 'url';
          const pills = `<button class="pill ${p.mode==='edit'?'on':''}" data-action="mode" data-mode="edit">編輯</button>
               <button class="pill ${p.mode==='locked'?'on':''}" data-action="mode" data-mode="locked">穿透</button>`;
          return `
          <div class="card" data-label="${esc(p.label)}">
            <div class="card-top">
              <span><span class="name">面板 ${i+1}</span><span class="tag">${isUrl?'URL':'擷取'}</span></span>
              <button class="x" data-action="close">&#x2715;</button>
            </div>
            <div class="card-body">
              ${p.url ? '<div class="card-url">'+esc(p.url)+'</div>' : ''}
              <div class="pills">${pills}</div>
              <div class="zoom-row">
                <span>縮放</span>
                <input type="range" min="10" max="200" value="${Math.round(p.zoom*100)}" data-action="zoom" />
                <span class="val" id="zv-${i}">${Math.round(p.zoom*100)}%</span>
              </div>
            </div>
          </div>`;
        }).join("");
      }

      // Event delegation — 全部掛在 listEl 上，避免 inline onclick CSP 問題
      listEl.addEventListener("click", async (e) => {
        const btn = e.target.closest("[data-action]");
        if (!btn) return;
        const card = btn.closest("[data-label]");
        if (!card) return;
        const label = card.dataset.label;
        const action = btn.dataset.action;

        if (action === "close") {
          try {
            await invoke("close_panel", { label });
            panels = panels.filter(p => p.label !== label);
            render();
          } catch (e) {
            alert("關閉失敗: " + e);
          }
        } else if (action === "mode") {
          const m = btn.dataset.mode;
          const p = panels.find(x => x.label === label);
          if (p) p.mode = m;
          try {
            await invoke("set_panel_mode", { label, mode: m });
          } catch(e) {
            alert("模式切換失敗: " + e);
          }
          render();
        }
      });

      listEl.addEventListener("input", async (e) => {
        const input = e.target;
        if (input.dataset.action !== "zoom") return;
        const card = input.closest("[data-label]");
        if (!card) return;
        const label = card.dataset.label;
        const v = parseInt(input.value);
        const z = v / 100;
        const p = panels.find(x => x.label === label);
        if (p) p.zoom = z;
        const idx = panels.findIndex(x => x.label === label);
        const el = document.getElementById("zv-" + idx);
        if (el) el.textContent = v + "%";
        try { await invoke("set_panel_zoom", { label, zoom: z }); } catch(e) {
          console.error("[settings] set_panel_zoom 失敗:", label, e);
        }
      });

      listen("panel-closed", (e) => { panels=panels.filter(p=>p.label!==e.payload); render(); });
      listen("panel-created", async (e) => {
        const d = e.payload;
        const label = typeof d === "string" ? d : d.label;
        const type = (typeof d === "object" && d.type) ? d.type : "capture";
        const url = (typeof d === "object" && d.url) ? d.url : null;
        if (label && !panels.find(p => p.label === label)) {
          const defaultMode = type === "capture" ? "locked" : "edit";
          panels.push({ label, url, type, mode: (typeof d === "object" && d.mode) || defaultMode, zoom: 1.0 });
        }
        render();
        await getCurrentWindow().show();
        await getCurrentWindow().setFocus();
      });

      async function syncPanels() {
        try {
          const existing = await invoke("list_panels");
          for (const p of existing) {
            const found = panels.find(x => x.label === p.label);
            if (!found) {
              panels.push({
                label: p.label,
                url: p.url || null,
                type: p.type || "capture",
                mode: p.mode || "locked",
                zoom: p.zoom || 1.0
              });
            }
          }
          render();
        } catch (e) {
          console.warn("[settings] list_panels 失敗:", e);
        }
      }
      syncPanels();
      render();

      // Debug: Ctrl+Click 標題
      document.querySelector(".top h1").addEventListener("click", async (e) => {
        if (!e.ctrlKey) return;
        document.getElementById("st").textContent = "執行 Debug 測試中...";
        try {
          const result = await invoke("run_debug_tests");
          alert("=== DEBUG REPORT ===\n\n" + result);
          document.getElementById("st").textContent = "Debug 完成";
        } catch (err) {
          alert("Debug 失敗: " + err);
          document.getElementById("st").textContent = "Debug 失敗: " + err;
        }
      });
    </script>
  </body>
</html>
