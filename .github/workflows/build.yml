name: Build & Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Rust (with Windows SDK)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build Tauri App
        run: npm run tauri build

      - name: Get Version
        id: version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | head -1 | cut -d'"' -f4)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename Files
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          cp src-tauri/target/release/wisdomboard.exe "src-tauri/target/release/WisdomBoard-${VERSION}-Portable.exe"
          cp src-tauri/target/release/bundle/nsis/*.exe "src-tauri/target/release/WisdomBoard-${VERSION}-Setup.exe" 2>/dev/null || true
          cp src-tauri/target/release/bundle/msi/*.msi "src-tauri/target/release/WisdomBoard-${VERSION}-Setup.msi" 2>/dev/null || true

      - name: Delete old latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --yes --cleanup-tag 2>$null; exit 0
        shell: pwsh

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          gh release create latest \
            --title "WisdomBoard v${VERSION} (Latest)" \
            --notes "自動建置 — $(date -u '+%Y-%m-%d %H:%M UTC')

          ## 下載
          - **WisdomBoard-${VERSION}-Portable.exe** — 免安裝，雙擊直接執行
          - **WisdomBoard-${VERSION}-Setup.exe** — NSIS 安裝檔
          - **WisdomBoard-${VERSION}-Setup.msi** — MSI 安裝檔（企業部署）
          " \
            --latest \
            "src-tauri/target/release/WisdomBoard-${VERSION}-Portable.exe" \
            "src-tauri/target/release/WisdomBoard-${VERSION}-Setup.exe" \
            "src-tauri/target/release/WisdomBoard-${VERSION}-Setup.msi"
